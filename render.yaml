services:
  - type: web
    name: predixai-alpha
    runtime: node
    plan: starter
    branch: alpha-release
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: ALPHA_ACCESS_PASSWORD
        sync: false
